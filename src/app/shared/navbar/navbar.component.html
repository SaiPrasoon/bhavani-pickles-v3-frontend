<app-sidebar [isOpen]="sidebarOpen()" (closed)="closeSidebar()" />

<header class="header" [class.header--scrolled]="scrolled()">
  <div class="header__left">
    <button class="icon-btn" (click)="toggleSidebar()" aria-label="Open menu">
      <span class="material-symbols-rounded">menu</span>
    </button>
  </div>

  <a routerLink="/" class="header__logo">
    <img src="bhavani-pickles-logo.svg" alt="Bhavani Pickles Logo" height="60" width="60" />
  </a>

  <div class="header__right">
    <a routerLink="/wishlist" class="icon-btn" aria-label="Wishlist">
      <span class="material-symbols-rounded">favorite</span>
    </a>

    <a routerLink="/cart" class="icon-btn cart-btn" aria-label="Cart">
      <span class="material-symbols-rounded">shopping_cart</span>
      @if (cartService.itemCount() > 0) {
        <span class="cart-badge">{{ cartService.itemCount() }}</span>
      }
    </a>

    <div class="user-menu">
      <button class="icon-btn" (click)="toggleUserMenu()" aria-label="User account">
        <span class="material-symbols-rounded">person</span>
      </button>

      @if (userMenuOpen()) {
        <div class="user-menu__dropdown" (click)="closeUserMenu()">
          @if (authService.isLoggedIn()) {
            <div class="user-menu__name">{{ authService.user()?.name }}</div>
            <hr />
            <a routerLink="/profile">My Profile</a>
            <a routerLink="/orders">My Orders</a>
            @if (authService.isAdmin()) {
              <a routerLink="/admin">Admin Panel</a>
            }
            <button (click)="authService.logout()">Logout</button>
          } @else {
            <a routerLink="/auth/login">Login</a>
            <a routerLink="/auth/register">Register</a>
          }
        </div>
      }
    </div>
  </div>
</header>
