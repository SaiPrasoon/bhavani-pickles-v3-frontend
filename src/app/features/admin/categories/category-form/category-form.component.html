<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-group">
    <label class="form-label">Name</label>
    <input class="form-control" formControlName="name" placeholder="Category name">
  </div>

  <div class="form-group">
    <label class="form-label">Description</label>
    <textarea class="form-control" formControlName="description" rows="3"></textarea>
  </div>

  <div class="form-group">
    <label class="form-label">Image (optional)</label>
    @if (previewUrl()) {
      <div class="img-preview">
        <img [src]="previewUrl()!" alt="Preview">
        <button type="button" class="img-preview__remove" (click)="clearFile()">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
    } @else {
      <label class="upload-area" for="cat-image">
        <span class="material-symbols-rounded">add_photo_alternate</span>
        <span>Click to upload image</span>
        <span class="upload-area__hint">JPEG, PNG or WebP · max 5 MB</span>
      </label>
    }
    <input
      id="cat-image"
      type="file"
      accept="image/jpeg,image/png,image/webp"
      class="file-input"
      (change)="onFileChange($event)"
    >
  </div>

  <div class="form-actions">
    <button class="btn btn--ghost" type="button" (click)="cancel()">Cancel</button>
    <button class="btn btn--primary" type="submit" [disabled]="form.invalid || saving()">
      {{ saving() ? 'Saving…' : (category() ? 'Update Category' : 'Add Category') }}
    </button>
  </div>
</form>
