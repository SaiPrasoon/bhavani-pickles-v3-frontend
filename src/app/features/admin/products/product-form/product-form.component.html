<form [formGroup]="form" (ngSubmit)="submit()">
  <!-- ── Basic info ─────────────────────────────────────────────── -->
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Name *</label>
      <input class="form-control" formControlName="name" placeholder="Product name" />
    </div>

    <div class="form-group">
      <label class="form-label">Category *</label>
      <select class="form-control" formControlName="category">
        <option value="" disabled>Select a category</option>
        @for (cat of categories(); track cat._id) {
          <option [value]="cat._id">{{ cat.name }}</option>
        }
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Description *</label>
    <textarea
      class="form-control"
      formControlName="description"
      rows="3"
      placeholder="Product description"
    ></textarea>
  </div>

  <!-- ── Variants ───────────────────────────────────────────────── -->
  <div class="variants-section">
    <div class="variants-header">
      <span class="form-label">Price Variants *</span>
      <button type="button" class="btn btn--sm btn--outline" (click)="addVariant()">
        <span class="material-symbols-rounded">add</span> Add Variant
      </button>
    </div>

    <div formArrayName="variants" class="variants-list">
      @for (vg of variantsArray.controls; track $index) {
        <div class="variant-card" [formGroupName]="$index">
          <div class="variant-card__header">
            <span class="variant-card__label">Variant {{ $index + 1 }}</span>
            @if (variantsArray.length > 1) {
              <button
                type="button"
                class="btn btn--icon btn--sm variant-card__remove"
                (click)="removeVariant($index)"
              >
                <span class="material-symbols-rounded">close</span>
              </button>
            }
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Weight *</label>
              <select class="form-control" formControlName="weight">
                <option value="" disabled>Select weight</option>
                <option value="100gms">100gms</option>
                <option value="200gms">200gms</option>
                <option value="250gms">250gms</option>
                <option value="500gms">500gms</option>
                <option value="1Kg">1Kg</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Price (₹) *</label>
              <input
                class="form-control"
                type="number"
                formControlName="price"
                placeholder="0"
                min="0"
              />
            </div>
            
            <div class="form-group">
              <label class="form-label">Stock *</label>
              <input
                class="form-control"
                type="number"
                formControlName="stock"
                placeholder="0"
                min="0"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Discounted Price (₹)</label>
              <input
                class="form-control"
                type="number"
                formControlName="discountedPrice"
                placeholder="Optional"
                min="0"
              />
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- ── Images ─────────────────────────────────────────────────── -->
  <div class="form-group">
    <label class="form-label">Images</label>

    <div class="images-grid">
      <!-- Existing images (when editing) -->
      @for (url of existingImages(); track url) {
        <div class="img-thumb">
          <img [src]="url" alt="Product image" />
          <button type="button" class="img-thumb__remove" (click)="removeExistingImage($index)">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
      }

      <!-- New image previews -->
      @for (url of previewUrls(); track $index) {
        <div class="img-thumb img-thumb--new">
          <img [src]="url" alt="New image" />
          <button type="button" class="img-thumb__remove" (click)="removeNewImage($index)">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
      }

      <!-- Upload trigger -->
      <label class="img-add-btn" for="product-images">
        <span class="material-symbols-rounded">add_photo_alternate</span>
        <span>Add Image</span>
      </label>
    </div>

    <input
      id="product-images"
      type="file"
      accept="image/jpeg,image/png,image/webp"
      multiple
      class="file-input"
      (change)="onFilesChange($event)"
    />
    <span class="form-hint">JPEG, PNG or WebP · max 5 MB each</span>
  </div>

  <!-- ── Status ─────────────────────────────────────────────────── -->
  <div class="form-group form-group--inline">
    <label class="toggle">
      <input type="checkbox" formControlName="isActive" />
      <span class="toggle__track"></span>
      <span class="toggle__label">Active (visible to customers)</span>
    </label>
  </div>

  <!-- ── Actions ────────────────────────────────────────────────── -->
  <div class="form-actions">
    <button class="btn btn--ghost" type="button" (click)="cancel()">Cancel</button>
    <button
      class="btn btn--primary"
      type="submit"
      [disabled]="form.invalid || saving() || uploading()"
    >
      {{ saving() || uploading() ? 'Saving…' : product() ? 'Update Product' : 'Add Product' }}
    </button>
  </div>
</form>
