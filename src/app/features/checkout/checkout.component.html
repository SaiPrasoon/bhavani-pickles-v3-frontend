<h1>Checkout</h1>

<div class="checkout-layout">
  <div class="checkout-form">
    <h3>Shipping Address</h3>
    <form [formGroup]="form" (ngSubmit)="placeOrder()">
      <div class="form-group">
        <label class="form-label">Street</label>
        <input class="form-control" formControlName="street" placeholder="House no, Street, Area">
      </div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">City</label>
          <input class="form-control" formControlName="city">
        </div>
        <div class="form-group">
          <label class="form-label">State</label>
          <input class="form-control" formControlName="state">
        </div>
      </div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">Pincode</label>
          <input class="form-control" formControlName="pincode">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-control" type="tel" formControlName="phone">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-control" formControlName="notes" rows="3" placeholder="Delivery instructions…"></textarea>
      </div>
      <button class="btn btn--primary full-width" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Placing Order…' : 'Place Order — ₹' + (cartService.cart()?.totalAmount || 0) }}
      </button>
    </form>
  </div>

  <div class="order-summary">
    <h3>Order Summary</h3>
    @for (item of cartService.cart()?.items; track item.product._id) {
      <div class="summary-row">
        <span>{{ item.product.name }} × {{ item.quantity }}</span>
        <span>₹{{ item.price * item.quantity }}</span>
      </div>
    }
    <hr>
    <div class="summary-row total">
      <strong>Total</strong>
      <strong>₹{{ cartService.cart()?.totalAmount }}</strong>
    </div>
  </div>
</div>
