<div class="auth-container">
  <div class="auth-card">
    <div class="auth-card__header">
      <button class="btn btn--icon back-icon" (click)="goBack()">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h2>Create Account</h2>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-control" formControlName="name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" formControlName="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" formControlName="password" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <input class="form-control" type="tel" formControlName="phone" placeholder="+91 XXXXX XXXXX">
      </div>
      <button class="btn btn--primary full-width" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Creating…' : 'Register' }}
      </button>
    </form>
    <p class="auth-footer">Already have an account? <a routerLink="/auth/login">Login</a></p>
  </div>
</div>
