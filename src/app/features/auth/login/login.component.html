<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" formControlName="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" formControlName="password" placeholder="••••••">
      </div>
      <button class="btn btn--primary full-width" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Logging in…' : 'Login' }}
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a routerLink="/auth/register">Register</a></p>
  </div>
</div>
